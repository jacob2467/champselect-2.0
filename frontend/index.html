<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>
    <body>
        <div id="main-container">
            <div id="control-panel"><form>
                <!-- Link to settings page -->
                <div class="component">
                    <button>
						<a href="settings.html" title="Settings page for the script">
							Settings
						</a>
					</button>
                </div>

                <!-- Gamestate -->
                <div class="component">
                    <label for="gamestate">
						Gamestate:&nbsp
					</label>
                    <span id="gamestate"> </span>
                </div>

                <!-- Role -->
                <div class="component">
					<label for="role">
						Role:&nbsp
					</label>
					<span id="role"> </span>
                </div>

                <!-- Pick intent -->
                <div class="component">
					<div class="component">
						<label for="pick-intent-input">
							Pick intent:&nbsp
						</label>
						<label for="pick-intent-input" id="pick-intent"> </label> <br>
					</div>
					<input id="pick-intent-input" placeholder="Champ to pick...">
                </div>

                <!-- Ban intent -->
                <div class="component">
					<div class="component">
						<label for="ban-intent-input">
							Ban intent:&nbsp
						</label>
						<label for="ban-intent-input" id="ban-intent"> </label>
					</div>
					<input id="ban-intent-input" placeholder="Champ to ban...">
                </div>

                <!-- Whether or not to replace runes/summs -->
                <div class="component">
					<label for="setrunes">
						Set runes:
					</label>
					<input type="checkbox" id="setrunes">
                </div>

                <!-- Lobby management -->
				<div class="component">
					<label for="lobbyDropdown">
						Select lobby type:
					</label>
					<select name="lobbyDropdown" id="lobbyDropdown">
						<option value="draft">
							Normal Draft
						</option>
						<option value="ranked">
							Ranked Solo/Duo
						</option>
						<option value="flex">
							Ranked Flex
						</option>
					</select>
                </div>
				<div class="component">
					<button id="lobbyButton">
						Create lobby
					</button>
					<button id="queuebutton">
						Start queue
					</button>
                </div>

                <!-- Script status -->
				<div class="component">
					<label for="scriptstatus">
						Script status:&nbsp
					</label>
					<span id="scriptstatus">
						Not running
					</span> <br>
                </div>
				<div class="component">
					<button id="startbutton">
						Start script
					</button>
                </div>

                <!-- Button to toggle dev console -->
				<div class="component">
					<button id="consoleButton">
						Open Developer Console
					</button>
                </div>

            </form> </div>
            <div id="log" class="log"> </div>
        </div>
    </body>
    <script src="api.js"></script>
    <script src="interface.js"></script>
    <script src="renderer.js"></script>
    <script> main() </script>
</html>
