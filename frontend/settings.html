<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="styles.css">
</head>
    <body>
        <!-- Link back to main settings page -->
        <div class="component">
            <button><a href="index.html" title="Go back to main settings page">Back</a></button>
        </div>
        <div class="container" style="display: flex">
            <!-- Champs to pick -->
            <div class="chunk champsection"><form>

                <h3 class="component">Picks:</h3>

                <div class="component">
                    <p>Top:</p>
                    <input id="cfg_pick_top-1"> <br>
                    <input id="cfg_pick_top-2"> <br>
                    <input id="cfg_pick_top-3"> <br>
                </div>

                <div class="component">
                    <p>Jungle:</p>
                    <input id="cfg_pick_jungle-1"> <br>
                    <input id="cfg_pick_jungle-2"> <br>
                    <input id="cfg_pick_jungle-3"> <br>
                </div>

                <div class="component">
                    <p>Mid:</p>
                    <input id="cfg_pick_middle-1"> <br>
                    <input id="cfg_pick_middle-2"> <br>
                    <input id="cfg_pick_middle-3"> <br>
                </div>

                <div class="component">
                    <p>ADC:</p>
                    <input id="cfg_pick_bottom-1"> <br>
                    <input id="cfg_pick_bottom-2"> <br>
                    <input id="cfg_pick_bottom-3"> <br>
                </div>

                <div class="component">
                    <p>Support:</p>
                    <input id="cfg_pick_utility-1"> <br>
                    <input id="cfg_pick_utility-2"> <br>
                    <input id="cfg_pick_utility-3"> <br>
                </div>
            </form> </div>

             <!-- Champs to ban -->
            <div class="chunk champsection"><form>
                <h3 class="component">Bans:</h3>

                <div class="component">
                    <p>Top:</p>
                    <input id="cfg_ban_top-1"> <br>
                    <input id="cfg_ban_top-2"> <br>
                    <input id="cfg_ban_top-3"> <br>
                </div>


                <div class="component">
                    <p>Jungle:</p>
                    <input id="cfg_ban_jungle-1"> <br>
                    <input id="cfg_ban_jungle-2"> <br>
                    <input id="cfg_ban_jungle-3"> <br>
                </div>

                <div class="component">
                    <p>Mid:</p>
                    <input id="cfg_ban_middle-1"> <br>
                    <input id="cfg_ban_middle-2"> <br>
                    <input id="cfg_ban_middle-3"> <br>
                </div>

                <div class="component">
                    <p>ADC:</p>
                    <input id="cfg_ban_bottom-1"> <br>
                    <input id="cfg_ban_bottom-2"> <br>
                    <input id="cfg_ban_bottom-3"> <br>
                </div>

                <div class="component">
                    <p>Support:</p>
                    <input id="cfg_ban_utility-1"> <br>
                    <input id="cfg_ban_utility-2"> <br>
                    <input id="cfg_ban_utility-3"> <br>
                </div>
            </form> </div>
            <div class="chunk champsection"><form>
                <h3 class="component">Main Settings:</h3>

                <!-- Set up elements to change for main settngs -->
                <div class="chunk"><form>
                    <!-- Game Directory -->
                    <div class="component">
                        <p> Game Directory:&nbsp </p>
                        <input id="cfg_directory"> <br>
                    </div>

                    <!-- Lock-in Delay -->
                    <div class="component">
						<label for="cfg_lock_in_delay">
							Pick/ban delay:&nbsp
						</label>
						<input id="cfg_lock_in_delay"> <br>
					</div>

                    <!-- Auto-start Queue -->
                    <div class="component">
						<label for="cfg_auto_start_queue">
							Auto-start queue:&nbsp
						</label>
						<input type="checkbox" id="cfg_auto_start_queue"> <br>
					</div>

                    <!-- Auto-send Runes-->
					<div class="component">
						<label for="cfg_auto_send_runes">
							Auto-send runes:&nbsp
						</label>
						<input type="checkbox" id="cfg_auto_send_runes"> <br>
                    </div>

                    <!-- Update Interval -->
					<div class="component">
						<label for="cfg_update_interval">
							Update interval in seconds:&nbsp
						</label>
						<input id="cfg_update_interval" placeholder=""> <br>
                    </div>

					<div class="component">
						<button id="saveButton"> Save Settings </button>
					</div>
                </form></div>
            </form> </div>
        </div>
    </body>
    <script src="settings.js"></script>
    <script src="api.js"></script>
    <script>
        setUpSettingsPage();
    </script>
</html>
